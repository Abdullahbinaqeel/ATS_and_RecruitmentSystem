<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- This makes the website scale properly on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563EB" />
    <meta
      name="description"
      content="TalentBridge — Multi-Branch Recruitment & Applicant Tracking System"
    />

    <!-- Plus Jakarta Sans for headings, Inter for body text -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>TalentBridge — Recruitment Portal</title>
  </head>
  <body>
    <!-- noscript is shown only if the user has JavaScript disabled -->
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- This is the single HTML element where React will inject the entire app -->
    <!-- React replaces this div's contents with your components -->
    <div id="root"></div>
  </body>
</html>
